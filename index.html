  <style>
    body { font-family: 'Inter', sans-serif; }
    #map { height: 100vh; width: 100%; z-index: 0; }
    .glass-panel { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(4px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .legend-box { width: 14px; height: 14px; display: inline-block; border-radius: 3px; margin-right: 8px; border: 1px solid rgba(0,0,0,0.1); }
    .tab-btn { border-bottom: 2px solid transparent; color: #64748b; }
    .tab-btn.active { border-bottom-color: #2563eb; color: #1e40af; font-weight: 600; }
    .zone-label { background: transparent; border: none; box-shadow: none; font-size: 10px; font-weight: 800; color: #334155; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff; text-transform: uppercase; white-space: nowrap; }
    .leaflet-control-download { background: white; width: 34px; height: 34px; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.65); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .leaflet-control-download:hover { background: #f4f4f4; }
    
    /* --- ESTILOS CORREGIDOS DEL POPUP --- */
    .leaflet-popup-content-wrapper { 
        padding: 0; 
        border-radius: 12px; 
        overflow: hidden; 
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .leaflet-popup-content { 
        margin: 0 !important; 
        width: 300px !important; /* Ancho fijo más grande */
        line-height: 1.4;
    }
    .leaflet-container a.leaflet-popup-close-button {
        color: white !important; /* X blanca */
        top: 12px;
        right: 12px;
        text-shadow: none;
        opacity: 0.8;
    }
    .leaflet-container a.leaflet-popup-close-button:hover {
        opacity: 1;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
    }
  </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800 bg-slate-100">

  <aside id="sidebar-panel" class="w-[420px] bg-white border-r border-slate-200 flex flex-col z-20 shadow-2xl h-full relative flex-shrink-0">
    <div class="p-5 border-b border-slate-100 bg-slate-50">
      <h1 class="text-xl font-bold text-slate-800 tracking-tight">SAE CAÑUELAS 2025</h1>
      <p class="text-xs text-slate-500 font-medium mt-1">Tesina Lic. Sociología FAHCE-UNLP</p>
      <p id="counter-schools" class="text-[10px] text-blue-600 font-bold mt-2 uppercase tracking-wider">Cargando datos...</p>
    </div>

    <div class="p-4 border-b border-slate-100">
      <label class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-2 block">Dimensión de Análisis</label>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="setMode('gestion')" id="btn-gestion" class="py-2 px-1 text-xs font-bold rounded border transition shadow-sm">Zonas SAE</button>
        <button onclick="setMode('iis')" id="btn-iis" class="py-2 px-1 text-xs font-bold rounded border transition shadow-sm">Intensidad</button>
        <button onclick="setMode('cnp')" id="btn-cnp" class="py-2 px-1 text-xs font-bold rounded border transition shadow-sm">Nutrición</button>
      </div>
    </div>

    <div class="flex border-b border-slate-200 px-4 space-x-4 bg-white sticky top-0 z-10">
      <button onclick="switchTab('resumen')" id="tab-resumen" class="tab-btn active py-3 text-xs uppercase tracking-wide flex-1 text-center">Análisis de Zona</button>
      <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn py-3 text-xs uppercase tracking-wide flex-1 text-center">Comparativa Global</button>
    </div>

    <div id="panel-content" class="flex-1 overflow-y-auto p-4 bg-slate-50/50 relative">
      <div id="content-resumen" class="animate-fade-in space-y-4">
        <div id="empty-state" class="text-center py-10 text-slate-400">
          <p class="text-sm font-bold text-slate-500">Selecciona una ZONA en el mapa</p>
          <p class="text-xs mt-2">Haz clic sobre un área coloreada para ver sus estadísticas.</p>
        </div>
        <div id="stats-container"></div>
      </div>

      <div id="content-stats" class="hidden space-y-6 animate-fade-in bg-white p-2">
        <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
          <h4 class="text-xs font-bold text-slate-700 mb-2 uppercase border-b pb-2">IIS por Zona (Boxplot)</h4>
          <div class="h-64 relative w-full"><canvas id="boxPlotIIS"></canvas></div>
        </div>
        <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
          <h4 class="text-xs font-bold text-slate-700 mb-2 uppercase border-b pb-2">CNP por Zona (Boxplot)</h4>
          <div class="h-64 relative w-full"><canvas id="boxPlotCNP"></canvas></div>
        </div>
      </div>
    </div>

    <div class="p-4 border-t border-slate-200 bg-white">
      <button onclick="downloadPanel()" class="w-full py-2 bg-slate-800 text-white rounded-lg text-xs font-bold hover:bg-slate-700 flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Descargar Reporte
      </button>
    </div>
  </aside>

  <main class="flex-1 relative">
    <div id="map"></div>
    <div id="legend" class="absolute bottom-6 right-6 z-[1000] glass-panel p-4 rounded-lg text-xs w-56 shadow-xl border border-white/50">
      <h4 class="font-bold mb-3 text-slate-800 border-b border-slate-200 pb-1">Referencias</h4>
      <div id="legend-content" class="space-y-1.5 max-h-64 overflow-y-auto pr-1"></div>
    </div>
  </main>

// --- HELPER: DATOS SEGUROS ---
function safeInt(val) {
    if(!val || val === 'S/D' || val === 'N/C' || val === '') return 0;
    return parseInt(val) || 0;
}
function safeFloat(val) {
    if(!val || val === 'S/D' || val === 'N/C' || val === '') return 0;
    return parseFloat(val.replace(',','.')) || 0;
}

// --- HELPER: CÁLCULOS ESTADÍSTICOS ---
function calculateStats(values) {
    const validValues = values.filter(v => v !== null && !isNaN(v)); // Filtrar nulos
    if (validValues.length === 0) return { min: 0, max: 0, mean: 0, median: 0, count: 0 };
    
    validValues.sort((a, b) => a - b);
    
    const sum = validValues.reduce((a, b) => a + b, 0);
    const count = validValues.length;
    const mean = sum / count;
    
    let median;
    const mid = Math.floor(count / 2);
    if (count % 2 !== 0) {
        median = validValues[mid];
    } else {
        median = (validValues[mid - 1] + validValues[mid]) / 2;
    }

    return {
        min: validValues[0],
        max: validValues[count - 1],
        mean: mean,
        median: median,
        count: count
    };
}

                </div>
                <div class="bg-white p-2 rounded border border-slate-100 shadow-sm">
                    <span class="block text-lg font-bold text-slate-700">${cnpStats.median.toFixed(1)}%</span>
                    <span class="text-[9px] text-slate-500 uppercase">Mediana</span>
                </div>
                <div class="col-span-2 flex justify-between px-4 py-1 bg-slate-50 rounded text-[10px] text-slate-500 font-mono">
                    <span>Min: <b>${cnpStats.min.toFixed(0)}%</b></span>
                    <span>Max: <b>${cnpStats.max.toFixed(0)}%</b></span>
                </div>
              </div>
            </div>
          </div>
        </div>
    `;

    const container = document.getElementById('stats-container');
    container.innerHTML = htmlContent;
    document.getElementById('empty-state').classList.add('hidden');
    switchTab('resumen');
}

// --- CARGA DE DATOS ---
let schoolsData = { "type": "FeatureCollection", "features": [] };

function parseCSVAndLoad() {
    const csvText = document.getElementById('csv-data').innerText.trim();
    
    Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let count = 0;
            results.data.forEach(row => {
                const lat = safeFloat(row['LATITUD']);
                const lng = safeFloat(row['LONGITUD']);
                
                if(lat === 0 || lng === 0) return;

                const zonaRaw = row['ZONA'] || '';
                const zoneName = zoneMapping[zonaRaw] || 'DESCONOCIDA';
                
                const matricula = safeInt(row['TOTAL MATRICULA']);
                const cupoCom = safeInt(row['CUPOS COMEDOR']);
                const cupoDMC = safeInt(row['CUPOS DESAYUNO/MERIENDA']);
                const cupoMesa = safeInt(row['modulo MESA']);
                const iis = safeFloat(row['IIS']);
                
                let cnp = 0;
                if(matricula > 0) cnp = ((cupoCom + cupoDMC) / matricula) * 100;

                schoolsData.features.push({
                    "type": "Feature",
                    "geometry": { "type": "Point", "coordinates": [lng, lat] },
                    "properties": {
                        "name": row['ESCUELA'] || 'Sin Nombre',
                        "nivel": row['NIVEL'] || '',
                        "matricula": matricula,
                        "cupos_comedor": cupoCom,
                        "cupos_dmc": cupoDMC,
                        "cupos_mesa": cupoMesa,
                        "iis_school": iis,
                        "cnp_school": cnp,
                        "zoneName": zoneName
                    }
                });
                count++;
            });
            
            schoolsLayer.addData(schoolsData);
            document.getElementById('counter-schools').innerText = `SE CARGARON ${count} ESCUELAS CORRECTAMENTE`;
            renderBoxPlots();
        }
    });
}

// --- ESTILOS ---
let currentMode = 'gestion';
let zonesLayer, schoolsLayer, boxPlotIIS, boxPlotCNP;

function styleZones(feature) {
  const name = feature.properties.name;
  let color = zoneColors.gestion[name] || '#999';
  if(currentMode === 'gestion') return { fillColor: color, weight: 1, opacity: 0.3, color: 'white', fillOpacity: 0.4 };
  else return { fillColor: '#fff', weight: 0, opacity: 0, fillOpacity: 0.05 };
}

function styleSchools(feature) {
  let color = '#333';
  const props = feature.properties;
  if (currentMode === 'gestion') color = zoneColors.gestion[props.zoneName] || '#333';
  else if(currentMode === 'iis') {
    if(props.iis_school > 3) color = zoneColors.iis.ALTO;
    else if(props.iis_school > 1.5) color = zoneColors.iis.MEDIO;
    else color = zoneColors.iis.BAJO;
  } else if(currentMode === 'cnp') {
    if(props.cnp_school > 100) color = zoneColors.cnp.ALTO;
    else if(props.cnp_school > 50) color = zoneColors.cnp.MEDIO;
    else color = zoneColors.cnp.BAJO;
  }
  return { radius: 6, fillColor: color, color: "#fff", weight: 1.5, opacity: 1, fillOpacity: 1 };
}

// --- CAPAS & POPUP MODIFICADO ---
zonesLayer = L.geoJSON(zonesData, {
  style: styleZones,
  onEachFeature: (feature, layer) => {
    layer.bindTooltip(feature.properties.name, { permanent: true, direction: "center", className: "zone-label" });
    layer.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        showZoneStats(feature.properties.name);
    });
  }
}).addTo(map);

schoolsLayer = L.geoJSON(null, {
  pointToLayer: (feature, latlng) => L.circleMarker(latlng, styleSchools(feature)),
  onEachFeature: (feature, layer) => {
    const p = feature.properties;
    // --- NUEVO DISEÑO DE POPUP MEJORADO ---
    const popupContent = `
        <div class="font-sans text-slate-800">
            <div class="bg-blue-900 text-white p-3 pr-8">
                <h3 class="font-bold text-sm leading-tight">${p.name}</h3>
                <p class="text-[10px] opacity-80 mt-1 uppercase tracking-wider">${p.nivel} • ${p.zoneName}</p>
            </div>
            <div class="p-3 bg-white">
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div class="bg-slate-50 p-2 rounded border border-slate-100">
                        <span class="block text-lg font-bold text-slate-700">${p.matricula}</span>
                        <span class="text-[9px] text-slate-400 uppercase tracking-wide">Matrícula</span>
                    </div>
                    <div class="bg-orange-50 p-2 rounded border border-orange-100">
                         <span class="block text-lg font-bold text-orange-600">${p.cupos_comedor}</span>
                        <span class="text-[9px] text-orange-400 uppercase tracking-wide">Comedor</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="bg-red-50 text-red-700 px-2 py-1 rounded text-[10px] font-bold border border-red-100 flex-1 text-center">
                        IIS: ${p.iis_school.toFixed(2)}
                    </div>
                    <div class="bg-green-50 text-green-700 px-2 py-1 rounded text-[10px] font-bold border border-green-100 flex-1 text-center">
                        CNP: ${p.cnp_school.toFixed(0)}%
                    </div>
                </div>
            </div>
        </div>
    `;
    layer.bindPopup(popupContent);
  }
}).addTo(map);

// --- INTERFAZ & GRÁFICOS ---
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('button[id^="btn-"]').forEach(btn => {
      btn.className = "py-2 px-1 text-xs font-bold rounded border transition bg-white text-slate-600 border-slate-200 hover:bg-slate-50";
  });
  document.getElementById(`btn-${mode}`).className = "py-2 px-1 text-xs font-bold rounded border transition bg-blue-600 text-white border-blue-600 shadow-md";
  zonesLayer.setStyle(styleZones);
  schoolsLayer.setStyle(styleSchools);
  zonesLayer.eachLayer(layer => { if(mode === 'gestion') layer.openTooltip(); else layer.closeTooltip(); });
  updateLegend();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById('content-resumen').classList.add('hidden');
    document.getElementById('content-stats').classList.add('hidden');
    document.getElementById(`content-${tab}`).classList.remove('hidden');
    if(tab === 'stats') renderBoxPlots();
}

function updateLegend() {
  const container = document.getElementById('legend-content');
  let html = '';
  if(currentMode === 'gestion') {
    for(let name in zoneColors.gestion) {
        if(name !== 'DESCONOCIDA') {
            html += `<div class="flex items-center"><span class="legend-box" style="background:${zoneColors.gestion[name]}"></span>${name}</div>`;
        }
    }
  } else if(currentMode === 'iis') {
    html = `<div class="flex items-center"><span class="legend-box" style="background:${zoneColors.iis.BAJO}"></span>Baja (< 1.5)</div>
            <div class="flex items-center"><span class="legend-box" style="background:${zoneColors.iis.MEDIO}"></span>Media (1.5 - 3)</div>
            <div class="flex items-center"><span class="legend-box" style="background:${zoneColors.iis.ALTO}"></span>Saturación (> 3)</div>`;
  } else {
    html = `<div class="flex items-center"><span class="legend-box" style="background:${zoneColors.cnp.BAJO}"></span>Baja (< 50%)</div>
            <div class="flex items-center"><span class="legend-box" style="background:${zoneColors.cnp.MEDIO}"></span>Media (50-100%)</div>
            <div class="flex items-center"><span class="legend-box" style="background:${zoneColors.cnp.ALTO}"></span>Alta (> 100%)</div>`;
  }
  container.innerHTML = html;
}

function renderBoxPlots() {
    if(boxPlotIIS) boxPlotIIS.destroy();
    if(boxPlotCNP) boxPlotCNP.destroy();

    const zones = Object.keys(zoneColors.gestion).filter(z => z !== 'DESCONOCIDA');
    const dataIIS = [], dataCNP = [];
    zones.forEach(zone => {
        const schools = schoolsData.features.filter(f => f.properties.zoneName === zone);
        if(schools.length > 0) {
            dataIIS.push(schools.map(s => s.properties.iis_school));
            dataCNP.push(schools.map(s => s.properties.cnp_school));
        } else { dataIIS.push([]); dataCNP.push([]); }
    });

    const configBox = (title, labels, data, color) => ({
        type: 'boxplot',
        data: {
            labels: labels,
            datasets: [{ label: title, backgroundColor: color, borderColor: '#334155', borderWidth: 1, outlierColor: '#ef4444', padding: 10, itemRadius: 2, data: data }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: {size:9}, autoSkip: false, maxRotation: 90, minRotation: 90 } }, y: { beginAtZero: true, grid: { color: '#f1f5f9' } } } }
    });

    const ctxIIS = document.getElementById('boxPlotIIS').getContext('2d');
    boxPlotIIS = new Chart(ctxIIS, configBox('IIS', zones, dataIIS, 'rgba(239, 68, 68, 0.5)'));
    const ctxCNP = document.getElementById('boxPlotCNP').getContext('2d');
    boxPlotCNP = new Chart(ctxCNP, configBox('CNP', zones, dataCNP, 'rgba(34, 197, 94, 0.5)'));
}

async function downloadElement(elementId, fileName) {
    const element = document.getElementById(elementId);
    const options = { allowTaint: true, useCORS: true, logging: false };
    if(elementId === 'map') options.ignoreElements = (node) => node.classList.contains('leaflet-control-zoom') || node.classList.contains('leaflet-control-download');
    try {
        const canvas = await html2canvas(element, options);
        const link = document.createElement('a');
        link.download = fileName + '.png';
        link.href = canvas.toDataURL();
        link.click();
    } catch(err) { alert("Error: " + err); }
}

function downloadPanel() {
    const activeTab = document.getElementById('tab-resumen').classList.contains('active') ? 'resumen' : 'stats';
    downloadElement(activeTab === 'resumen' ? 'content-resumen' : 'content-stats', 'SAE_' + activeTab);
}

// INICIO
parseCSVAndLoad();
setMode('gestion');
updateLegend();
</script>
</body>
</html>
